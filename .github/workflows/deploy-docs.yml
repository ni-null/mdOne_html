name: Build & Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'templates/**'
      - 'locales/**'
      - 'main.py'
      - 'requirements.txt'
  # 允許手動從 Actions 頁面觸發
  workflow_dispatch:

# 設定 GitHub Pages 部署所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署，但不取消進行中的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate HTML documentation
        run: |
          mkdir -p ./GitPage
          # 避免 GitHub Pages 用 Jekyll 處理，保留原始 HTML
          touch ./GitPage/.nojekyll
          python main.py \
            --output ./GitPage/index.html \
            --source ./docs

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./GitPage

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
